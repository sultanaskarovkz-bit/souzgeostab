        (function() {
            const plate = document.querySelector('.geo404__plate');
            const stage = document.querySelector('.geo404__stage');
            const voidZone = document.querySelector('.geo404__void');
            const ctaButton = document.querySelector('[data-action="stabilize"]');
            const recoveryDiv = document.querySelector('.geo404__recovery');
            const svgContainer = document.querySelector('.geo404__injection-lines');
            let isAnimating = false;
            let hasRecovered = false;

            // Generate injection lines SVG
            function generateInjectionLines() {
                const lineCount = 8;
                for (let i = 0; i < lineCount; i++) {
                    const angle = (i / lineCount) * Math.PI * 0.6 - Math.PI * 0.3;
                    const length = 100 + Math.random() * 40;
                    const startX = 200 + Math.cos(angle + Math.PI) * 20;
                    const startY = 250;
                    const endX = startX + Math.cos(angle) * length;
                    const endY = startY + Math.sin(angle) * length;

                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('class', 'injection-line');
                    line.setAttribute('x1', startX);
                    line.setAttribute('y1', startY);
                    line.setAttribute('x2', endX);
                    line.setAttribute('y2', endY);
                    line.style.animationDelay = `${i * 0.1}s`;

                    svgContainer.appendChild(line);
                }
            }

            // Main stabilization animation
            function stabilize() {
                if (isAnimating || hasRecovered) return;
                isAnimating = true;

                // Show injection lines
                svgContainer.style.opacity = '1';

                // Lift plate with ease-out-back effect
                plate.style.animation = 'none';
                plate.offsetHeight; // Trigger reflow

                    voidZone.style.opacity = '0';

                // Show recovery message

                    recoveryDiv.classList.add('is-active');
                    ctaButton.style.opacity = '0.5';
                    ctaButton.disabled = true;
                    hasRecovered = true;
                }, 1300);

                isAnimating = false;
            }

            // Add lift animation keyframes dynamically
            const style = document.createElement('style');
            style.textContent = `
                @keyframes plateLift {
                    0% {
                        transform: translateY(100px);
                        opacity: 1;
                    }
                    100% {
                        transform: translateY(0);
                        opacity: 1;
                    }
                }
            `;
            document.head.appendChild(style);

            // Event listeners
            ctaButton.addEventListener('click', stabilize);

            // Initialize
            generateInjectionLines();

            // Trigger void zone on page load
            setTimeout(() => {
                voidZone.style.opacity = '1';
            }, 1200);
        })();
